name: CI_build

on: [push, pull_request]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_platform: [x64, Win32, ARM64]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: MSBuild of plugin dll Debug
      working-directory: .\
      run: |
           msbuild NppTreeSitter.vcxproj /m /p:configuration=Debug /p:platform="${{ matrix.build_platform }}"

    - name: MSBuild of plugin dll Release
      working-directory: .\
      run: |
           msbuild NppTreeSitter.vcxproj /m /p:configuration=Release /p:platform="${{ matrix.build_platform }}"

    - name: Build grammar DLLs for Release ${{ matrix.build_platform }}
      shell: powershell
      run: |
           .\grammars\build-grammars.ps1 -Platform "${{ matrix.build_platform }}" -Configuration Release

    - name: Package release zip for ${{ matrix.build_platform }}
      shell: powershell
      run: |
           .\package-release.ps1 -Platform "${{ matrix.build_platform }}" -Configuration Release -OutDir .\release

    - name: Get tag name
      id: tagName
      shell: bash
      run: |
           if [[ "${{ github.ref_type }}" == "tag" ]]; then
             echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
           else
             echo "tag=" >> "$GITHUB_OUTPUT"
           fi

    - name: zip artifacts for Release ${{ matrix.build_platform }}
      shell: powershell
      run: |
           $packageName = switch ("${{ matrix.build_platform }}") {
             "x64" { "NppTreeSitter-x64.zip" }
             "Win32" { "NppTreeSitter-x86.zip" }
             "ARM64" { "NppTreeSitter-arm64.zip" }
           }
           Copy-Item ".\release\$packageName" "NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip"

    - name: Archive artifacts for Release ${{ matrix.build_platform }}
      uses: actions/upload-artifact@v7
      with:
        name: NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip
        path: NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip

    - name: Create release on tagging
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip
