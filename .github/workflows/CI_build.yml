name: CI_build

on: [push, pull_request]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_platform: [x64, Win32, ARM64]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: MSBuild of plugin dll Debug
      working-directory: .\
      run: |
           msbuild NppTreeSitter.vcxproj /m /p:configuration=Debug /p:platform="${{ matrix.build_platform }}"

    - name: MSBuild of plugin dll Release
      working-directory: .\
      run: |
           msbuild NppTreeSitter.vcxproj /m /p:configuration=Release /p:platform="${{ matrix.build_platform }}"

    - uses: olegtarasov/get-tag@v2.1.4
      id: tagName

    - name: zip artifacts for Release ${{ matrix.build_platform }}
      run: |
           7z a NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip .\build\${{ matrix.build_platform }}\Release\TreeSitterLexer.dll
           7z a NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip .\release\NppTreeSitter-x64\plugins\

    - name: Archive artifacts for Release ${{ matrix.build_platform }}
      uses: actions/upload-artifact@v7
      with:
        name: NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip
        path: NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip

    - name: Create release on tagging
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: NppTreeSitter_${{ steps.tagName.outputs.tag }}_${{ matrix.build_platform }}.zip